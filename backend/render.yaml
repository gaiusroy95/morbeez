# Render Blueprint — Morbeez API + React console
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: morbeez-api
    runtime: node
    rootDir: backend
    # Install devDeps for UI builds; @types/node + typescript are in dependencies for tsc under NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
