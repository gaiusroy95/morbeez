name: Enterprise CI

on:
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'packages/shared/**'
      - 'supabase/migrations/202607*.sql'
      - 'supabase/migrations/202608*.sql'
      - '.github/workflows/enterprise-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'packages/shared/**'
      - 'supabase/migrations/202607*.sql'
      - 'supabase/migrations/202608*.sql'
      - '.github/workflows/enterprise-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build API
        run: npm run build:api

      - name: Run enterprise tests
        run: |
          node --import tsx --test \
            tests/enterprise-e2e.test.ts \
            tests/ginger-enterprise-e2e.test.ts \
            tests/visit-command-center.test.ts \
            tests/retraining-queue.test.ts \
            tests/weakness-dashboard.test.ts \
            tests/phase1-write-paths.test.ts \
            tests/compatibility-analytics.test.ts \
            tests/adaptive-protocol.test.ts \
            tests/satellite-provider.test.ts \
            tests/product-gap-alternatives.test.ts

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
